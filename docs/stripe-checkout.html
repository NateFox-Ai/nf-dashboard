<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Effortless Onboarding</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        
        .product {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .product h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .product .price {
            font-size: 36px;
            font-weight: 700;
            color: #4ade80;
            margin-bottom: 10px;
        }
        
        .product .description {
            color: #888;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #888;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 16px;
        }
        
        input::placeholder {
            color: #666;
        }
        
        #card-element {
            background: rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .error {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .success {
            color: #4ade80;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .secure {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #888;
        }
        
        .secure::before {
            content: "🔒 ";
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Complete Your Payment</h1>
        <p class="subtitle">Effortless Onboarding</p>
        
        <div class="product">
            <h2>Automation Setup</h2>
            <div class="price">$2,500</div>
            <p class="description">Custom client onboarding automation built for your workflow. Includes 30 days support.</p>
        </div>
        
        <form id="payment-form">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="card-element">Credit or debit card</label>
                <div id="card-element"></div>
                <div id="card-errors" class="error" role="alert"></div>
            </div>
            
            <button id="submit-button" type="submit">
                Pay $2,500
            </button>
            
            <div id="payment-result"></div>
        </form>
        
        <p class="secure">Secure payment powered by Stripe</p>
    </div>

    <script>
        // Initialize Stripe with your publishable key
        // Replace with your actual Stripe publishable key
        const stripe = Stripe('pk_test_YOUR_PUBLISHABLE_KEY_HERE');
        const elements = stripe.elements();
        
        // Create card element
        const cardElement = elements.create('card', {
            style: {
                base: {
                    fontSize: '16px',
                    color: '#fff',
                    '::placeholder': {
                        color: '#666',
                    },
                },
            },
        });
        
        cardElement.mount('#card-element');
        
        // Handle form submission
        const form = document.getElementById('payment-form');
        const submitButton = document.getElementById('submit-button');
        const resultContainer = document.getElementById('payment-result');
        
        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            submitButton.disabled = true;
            
            // Create payment method
            const {error, paymentMethod} = await stripe.createPaymentMethod({
                type: 'card',
                card: cardElement,
                billing_details: {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                },
            });
            
            if (error) {
                // Show error
                document.getElementById('card-errors').textContent = error.message;
                submitButton.disabled = false;
            } else {
                // Success - show message
                resultContainer.innerHTML = '<p class="success">Payment method created! In test mode, no actual charge is made.</p>';
                
                // In production, you would send paymentMethod.id to your server
                console.log('Payment Method ID:', paymentMethod.id);
            }
        });
        
        // Handle card errors
        cardElement.on('change', (event) => {
            const displayError = document.getElementById('card-errors');
            if (event.error) {
                displayError.textContent = event.error.message;
            } else {
                displayError.textContent = '';
            }
        });
    </script>
</body>
</html>
